<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Blood Canvas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="stage" aria-label="Interactive image canvas scene">
      <div class="canvas-wrap">
        <canvas id="sceneCanvas" aria-label="Canvas displaying two local images"></canvas>
      </div>

      <div class="instructions">
        <h1>Interactive canvas</h1>
        <p>Both local images are drawn inside the canvas. Click an image to make blood drops slide down over it.</p>
      </div>
    </section>
  </main>

  <script src="script-2.js" defer></script>
</body>
</html>
